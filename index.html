<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>18+</title>
<style>
body{
  margin:0;
  padding:0;
  background:#000;
  text-align:center;
  font-family:Arial;
}

img{
  width:100%;
  max-width:600px;
  display:block;
  margin:auto;
  margin-bottom:10px;
  border-radius:8px;
}

.button{
  display:block;
  width:90%;
  max-width:400px;
  margin:20px auto;
  padding:18px;
  background:red;
  color:white;
  font-size:22px;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>
<body>

<!-- Фото будут подставляться через JS -->
<div id="gallery"></div>

<!-- Кнопка -->
<a class="button" href="https://prev.affomelody.com/click?pid=6350&offer_id=25" target="_blank">
СМОТРЕТЬ
</a>

<script>
// ==== Настройки ====
const datingLink = "https://prev.affomelody.com/click?pid=6350&offer_id=25";
const casinoLink = "https://onlinepnpbit.com/2Vi4txHl/";

// ==== Фото ====
const girls = [
  "https://i.postimg.cc/9X8t1WDX/IMG-20260309-061848-965.jpg",
  "https://i.postimg.cc/c19MTsvH/IMG-20260309-075128-325.jpg",
  "https://i.postimg.cc/05WdZ8zy/IMG-20260309-075130-800.jpg",
  "https://i.postimg.cc/J76cK1st/IMG-20260309-075133-235.jpg",
  "https://i.postimg.cc/xjxyg0X8/IMG-20260309-075138-403.jpg",
  "https://i.postimg.cc/VsGB4YJS/IMG-20260309-075141-356.jpg",
  "https://i.postimg.cc/HWZ43pr7/IMG-20260309-075143-800.jpg",
  "https://i.postimg.cc/HWZ43pry/IMG-20260309-075145-345.jpg",
  "https://i.postimg.cc/597qpxXz/IMG-20260309-075147-869.jpg",
  "https://i.postimg.cc/VsGB4YJX/IMG-20260309-075150-337.jpg",
  "https://i.postimg.cc/bYCHLzZQ/IMG-20260309-075152-672.jpg"
];

// ==== Функция перемешивания ====
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

// ==== Отображение фото ====
const gallery = document.getElementById("gallery");
const shuffled = shuffle(girls);

shuffled.forEach(src => {
  const a = document.createElement("a");
  a.href = datingLink;
  a.target = "_blank";
  
  const img = document.createElement("img");
  img.src = src;
  
  a.appendChild(img);
  gallery.appendChild(a);
});

// ==== BACK BUTTON REDIRECT ====
history.pushState(null,null,location.href);
window.onpopstate = function () {
  location.href = casinoLink;
};
</script>

</body>
</html>
