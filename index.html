<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Tonight</title>
<style>
body{margin:0;font-family:Arial;height:100vh;overflow:hidden;background:#0e1621;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding-bottom:20px;cursor:pointer;}
.bgLayer{position:fixed;top:0;left:0;width:100%;height:100%;background:center/cover no-repeat;transition:opacity 1s ease, transform 4s linear;z-index:-1;opacity:0;transform:scale(1.12);}
.bgLayer.active{opacity:1;transform:scale(1);}
.button-container{display:flex;width:90%;max-width:600px;gap:20px;z-index:999;}
.button-left, .button-right, .casino-btn{flex:1;padding:14px;border-radius:30px;font-size:18px;font-weight:bold;color:#fff;border:none;cursor:pointer;backdrop-filter:blur(10px);transition: transform 0.2s ease, background 0.3s ease;user-select:none;text-align:center;text-shadow:1px 1px 2px #000;}
.button-left { background: linear-gradient(45deg, rgba(0,198,255,0.3), rgba(0,114,255,0.3)); }
.button-right { background: linear-gradient(45deg, rgba(255,46,99,0.3), rgba(255,122,24,0.3)); animation: meetPulse 1.2s infinite alternate;}
.casino-btn{background: rgba(255,215,0,0.25); color:#fff; opacity:0; pointer-events:none;}
@keyframes meetPulse {0%{transform:scale(1);}100%{transform:scale(1.08);}}
.button-left:hover, .button-right:hover, .casino-btn:hover {transform: scale(1.05);}
.button-left:active, .button-right:active, .casino-btn:active {transform: scale(0.95);}
#exitModal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;visibility:hidden;opacity:0;transition:0.3s;z-index:999;}
#exitModal.active{visibility:visible;opacity:1;}
.modal-box{background:#111;padding:20px;border-radius:15px;text-align:center;max-width:300px;}
.modal-box h3{color:#fff;margin-bottom:10px;text-shadow:1px 1px 2px #000;}
.modal-btn{margin-top:10px;width:100%;padding:10px;border:none;border-radius:20px;font-weight:bold;cursor:pointer;transition: transform 0.2s ease;text-shadow:1px 1px 2px #000;}
.modal-btn:active{transform: scale(0.95);}
.tg-btn{background:#0088cc;color:#fff;}
.stay-btn{background:#444;color:#fff;}
@media (max-width: 400px){.button-container{gap:10px;}.button-left,.button-right,.casino-btn{font-size:16px;padding:10px;border-radius:20px;}}
</style>
</head>
<body>

<div id="bgLayer1" class="bgLayer"></div>
<div id="bgLayer2" class="bgLayer"></div>

<div class="button-container" style="margin-bottom:10px;">
  <button class="casino-btn" id="casinoBanner"></button>
</div>

<div class="button-container">
  <button class="button-left" id="chatBtn">💬 Telegram</button>
  <button class="button-right" id="meetBtn">❤️ Meet Now</button>
</div>

<div id="exitModal">
  <div class="modal-box">
    <h3></h3>
    <p style="color:#ccc;font-size:14px;"></p>
    <button class="modal-btn tg-btn" id="goTG"></button>
    <button class="modal-btn stay-btn" id="stay"></button>
  </div>
</div>

<script>
const telegramChat="https://t.me/+NFHjJC5nOndlZjky";
const smartLink="https://prev.affomelody.com/click?pid=6350&offer_id=25";
const smartLink2="https://rdlwl.amouronlline.com/?utm_source=da57dc555e50572d&ban=tg&j1=1&s1=44438&s2=2235907";

const bgLayer1=document.getElementById("bgLayer1");
const bgLayer2=document.getElementById("bgLayer2");
const chatBtn=document.getElementById("chatBtn");
const meetBtn=document.getElementById("meetBtn");
const goTG=document.getElementById("goTG");
const stay=document.getElementById("stay");
const casinoBanner=document.getElementById("casinoBanner");
const modal = document.getElementById("exitModal");

const translations = {
  modalTitle: { ru:"Уже уходишь?", en:"Leaving already?", de:"Schon weg?", fr:"Vous partez déjà?", es:"¿Ya te vas?" },
  modalText:  { ru:"Тебя ждут в Telegram 👇", en:"Telegram is waiting for you 👇", de:"Telegram wartet auf dich 👇", fr:"Telegram vous attend 👇", es:"Telegram te espera 👇" },
  modalGo:    { ru:"Перейти в Telegram", en:"Go to Telegram", de:"Zu Telegram", fr:"Aller sur Telegram", es:"Ir a Telegram" },
  modalStay:  { ru:"Остаться", en:"Stay", de:"Bleiben", fr:"Rester", es:"Quedarse" },
  casinoPhrases: {
    ru:["🔥 Новые анкеты","💋 Больше девушек"],
    en:["🔥 More Girls","💋 New Matches"],
    de:["🔥 Mehr Girls","💋 Neue Matches"],
    fr:["🔥 Plus de profils","💋 Nouvelles rencontres"],
    es:["🔥 Más chicas","💋 Nuevos matches"]
  }
};

// ================== фон ==================
const photos=[];
const preloadedImages = [];

// первые 5 фото загружаем сразу
for(let i=1;i<=5;i++){
  const url=`https://SheOnline24.github.io/tender/photos/FindGirl${i}.jpg`;
  photos.push(url);
  const img = new Image();
  img.src = url;
  preloadedImages.push(img);
}

// остальные фото подгружаем постепенно
for(let i=6;i<=66;i++){
  const url=`https://SheOnline24.github.io/tender/photos/FindGirl${i}.jpg`;
  photos.push(url);
  setTimeout(()=>{
    const img = new Image();
    img.src = url;
    preloadedImages.push(img);
  }, (i-5)*50);
}

let active=0;
function startBg(){
  let order = [...Array(photos.length).keys()];
  function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } }
  shuffle(order);
  let currentIndex=0;
  bgLayer1.style.backgroundImage = `url('${photos[order[0]]}')`;
  bgLayer1.classList.add("active");

  setInterval(()=>{
    currentIndex++;
    if(currentIndex>=order.length){ shuffle(order); currentIndex=0; }
    const nextIndex = order[currentIndex];
    const inactive = 1-active;
    [bgLayer1,bgLayer2][inactive].style.backgroundImage = `url('${photos[nextIndex]}')`;
    [bgLayer1,bgLayer2][active].classList.remove("active");
    [bgLayer1,bgLayer2][inactive].classList.add("active");
    active = inactive;
  },4000);
}
startBg();

// ================== кнопки ==================
chatBtn.onclick=e=>{e.stopPropagation(); window.location.href=telegramChat;};
meetBtn.onclick=e=>{e.stopPropagation(); window.location.href=smartLink;};
document.body.addEventListener('click',e=>{
  if(!e.target.closest('.button-container') && e.target !== casinoBanner) window.location.href=smartLink;
});

// ================== казино/смарт-кнопка ==================
async function detectLang(){
  try {
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();
    const countryCode = data.country_code ? data.country_code.toLowerCase() : null;
    const browserLang = (navigator.language || navigator.userLanguage).split('-')[0];
    const geoLangMap = { "de":"de", "fr":"fr", "es":"es", "us":"en", "gb":"en", "ru":"ru" };
    let lang = geoLangMap[countryCode] || browserLang || "en";
    if(!["ru","en","de","fr","es"].includes(lang)) lang="en";
    return lang;
  } catch(e){ return "en"; }
}

detectLang().then(lang=>{
  document.querySelector("#exitModal h3").textContent = translations.modalTitle[lang];
  document.querySelector("#exitModal p").textContent = translations.modalText[lang];
  document.querySelector("#goTG").textContent = translations.modalGo[lang];
  document.querySelector("#stay").textContent = translations.modalStay[lang];

  let idx=0;
  let phrases = translations.casinoPhrases[lang];

  setTimeout(()=>{
    casinoBanner.style.opacity=1;
    casinoBanner.style.pointerEvents="auto";
    casinoBanner.addEventListener('click',()=> window.location.href = smartLink2);
    casinoBanner.textContent = phrases[idx];
    setInterval(()=>{ idx=(idx+1)%phrases.length; casinoBanner.textContent = phrases[idx]; },3000);
  },5000);
});

// ================== exit modal ==================
let modalShown=false;
function showExitModal(){ if(modalShown) return; modalShown=true; modal.classList.add("active"); }
history.pushState({},"",location.href);
window.addEventListener("popstate",()=>{ showExitModal(); setTimeout(()=>history.pushState({},"",location.href),100); });
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="hidden") showExitModal(); });
goTG.onclick=()=>window.location.href=telegramChat;
stay.onclick=()=>modal.classList.remove("active");
modal.addEventListener("click",e=>{ if(e.target===modal) modal.classList.remove("active"); });

</script>
</body>
</html>
