<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Dating</title>

<style>

body{
margin:0;
height:100vh;
background-size:cover;
background-position:center;
font-family:Arial;
cursor:pointer;
}

/* затемнение для читаемости */
.overlay-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
}

/* кнопка */
.btn{
position:fixed;
bottom:40px;
right:40px;
background:#ff2a6d;
color:white;
padding:18px 32px;
font-size:20px;
border-radius:50px;
text-decoration:none;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
z-index:10;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
background:#ff0f5a;
}

</style>
</head>

<body>

<div class="overlay-bg"></div>

<a class="btn" href="ТВОЙ_СМАРТЛИНК" target="_blank">
💬 Смотреть анкеты
</a>

<script>

/* быстрые оптимизированные фото */
const girls = [

"https://images.pexels.com/photos/415829/pexels-photo-415829.jpeg?auto=compress&cs=tinysrgb&w=1200",
"https://images.pexels.com/photos/774909/pexels-photo-774909.jpeg?auto=compress&cs=tinysrgb&w=1200",
"https://images.pexels.com/photos/1239291/pexels-photo-1239291.jpeg?auto=compress&cs=tinysrgb&w=1200",
"https://images.pexels.com/photos/762020/pexels-photo-762020.jpeg?auto=compress&cs=tinysrgb&w=1200",
"https://images.pexels.com/photos/936229/pexels-photo-936229.jpeg?auto=compress&cs=tinysrgb&w=1200"

];

const randomGirl = girls[Math.floor(Math.random()*girls.length)];

document.body.style.backgroundImage = "url("+randomGirl+")";

/* клик по странице */
document.body.addEventListener("click", function(e){

if(!e.target.classList.contains("btn")){
window.location.href="ТВОЙ_СМАРТЛИНК";
}

});

</script>

</body>
</html>
