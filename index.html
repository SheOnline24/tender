<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Tonight</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
  cursor:pointer;
  background:#0e1621 center/cover no-repeat;
  transition: background-image 1s ease;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:20px;
  position:relative;
}

.button-container{
  display:flex;
  justify-content:space-between;
  width:90%;
  max-width:600px;
  margin-bottom:10px;
  gap:20px;
  z-index:10;
}

.button-left,.button-right{
  flex:1;
  padding:14px 0;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  text-align:center;
  animation:flash 1s infinite;
  border:none;
}

.button-left{background:linear-gradient(45deg,#00c6ff,#0072ff);}
.button-right{background:linear-gradient(45deg,#ff2e63,#ff7a18);}

@keyframes flash{
  0%,50%,100%{opacity:1}
  25%,75%{opacity:.5}
}

/* онлайн кружок */
.online-circle{
  position:fixed;
  top:30px;
  right:30px;
  width:60px;
  height:60px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid #00ff6a;
  box-shadow:0 0 12px #00ff6a;
}

.online-circle img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* БАННЕР */
#casinoBanner{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translate(-50%,30px); /* старт ниже */
  padding:15px 25px;
  background:linear-gradient(45deg,#ffd700,#ffb700);
  color:#000;
  font-size:20px;
  font-weight:bold;
  border-radius:25px;
  cursor:pointer;

  opacity:0;
  visibility:hidden;

  transition: all 0.8s ease;

  animation: bannerGlow 2s infinite;
  animation-play-state: paused;

  max-width:90%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align:center;
}

@keyframes bannerGlow{
  0%,100%{opacity:1;}
  50%{opacity:0.75;}
}
</style>
</head>

<body>

<div class="online-circle">
  <img id="circlePhoto">
</div>

<div class="button-container">
  <button class="button-left" id="chatBtn">Secret Chat</button>
  <button class="button-right" id="meetBtn">Meet Her Now</button>
</div>

<div id="casinoBanner">🎁 Получи бонус!</div>

<script>
const casinoOffer="https://onlinepnpbit.com/2Vi4txHl/";
const telegramChat="https://t.me/+NFHjJC5nOndlZjky";
const smartLink="https://prev.affomelody.com/click?pid=6350&offer_id=25";

/* 66 фото */
const bgPhotos=[];
for(let i=1;i<=66;i++){
  bgPhotos.push(`https://SheOnline24.github.io/tender/photos/FindGirl${i}.jpg`);
}

let currentIndex=-1;
function changeBackground(){
  let next;
  do{next=Math.floor(Math.random()*bgPhotos.length);}
  while(next===currentIndex);
  document.body.style.backgroundImage=`url('${bgPhotos[next]}')`;
  currentIndex=next;
}
changeBackground();
setInterval(changeBackground,8000);

/* аватар */
async function loadPhoto(){
  try{
    const res=await fetch("https://randomuser.me/api/?gender=female");
    const data=await res.json();
    document.getElementById("circlePhoto").src=data.results[0].picture.medium;
  }catch{}
}
setInterval(loadPhoto,9000);
loadPhoto();

/* кнопки */
chatBtn.onclick=e=>{e.stopPropagation();location.href=telegramChat;}
meetBtn.onclick=e=>{e.stopPropagation();location.href=smartLink;}
document.body.onclick=()=>location.href=smartLink;

/* гео текст */
async function setText(){
  let country="RU";
  try{
    const r=await fetch("https://ipapi.co/json/");
    const d=await r.json();
    country=d.country_code;
  }catch{}

  const banner=document.getElementById("casinoBanner");

  if(country==="RU") banner.textContent="🎁 Получи бонус!";
  else banner.textContent="🎁 Claim your bonus!";

  adjustFont();
}

function adjustFont(){
  const el=document.getElementById("casinoBanner");
  let size=20;
  el.style.fontSize=size+"px";
  while(el.scrollWidth>el.clientWidth && size>12){
    size--;
    el.style.fontSize=size+"px";
  }
}

setText();

/* ПОЯВЛЕНИЕ БАННЕРА */
const banner=document.getElementById("casinoBanner");

setTimeout(()=>{
  banner.style.visibility="visible";
  banner.style.opacity=1;
  banner.style.transform="translate(-50%,0)"; // подъём вверх

  setTimeout(()=>{
    banner.style.animationPlayState="running"; // мигание после появления
  },800);

  banner.onclick=()=>location.href=casinoOffer;

},10000);

/* редирект */
function goTelegram(){location.href=telegramChat;}
document.addEventListener("visibilitychange",()=>{if(document.hidden)setTimeout(goTelegram,2000);});
window.addEventListener("blur",()=>setTimeout(goTelegram,1500));
</script>

</body>
</html>
