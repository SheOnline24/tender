<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Online Dating</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  /* Фон с девушкой на весь экран */
  #background {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
  }

  /* Кнопка в правом нижнем углу */
  #btn {
    position: fixed;
    bottom: 40px;
    right: 40px;
    padding: 16px 32px;
    font-size: 20px;
    border: none;
    border-radius: 40px;
    background: linear-gradient(45deg,#ff2e63,#ff7a18);
    color: white;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255,46,99,0.8);
    transition: transform 0.3s, box-shadow 0.3s;
    z-index: 10;
  }

  #btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 35px rgba(255,46,99,1);
  }

</style>
</head>
<body>

<!-- Картинка на фоне -->
<img id="background" src="" alt="Girl">

<!-- Кнопка перехода -->
<button id="btn">Meet Me ❤️</button>

<script>
  // Партнёрская ссылка
  const DATING = "https://kfl2prr.datelovelygirls.com/vv6pzuc?s1=Online24";

  // Задаём картинку
  const bg = document.getElementById("background");
  bg.src = "https://thispersondoesnotexist.com/image?" + Math.random();

  // Кнопка
  document.getElementById("btn").onclick = () => {
    window.location.href = DATING;
  };
</script>

</body>
</html>
