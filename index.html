<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Tonight</title>
<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
  background:#0e1621;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:20px;
  cursor:pointer;
}

/* фон */
.bgLayer{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:center/cover no-repeat;
  transition:opacity 1s ease, transform 4s linear;
  z-index:-1;
  opacity:0;
  transform:scale(1.12);
}
.bgLayer.active{opacity:1;transform:scale(1);}

/* кнопки */
.button-container{
  display:flex;
  width:90%;
  max-width:600px;
  gap:20px;
  z-index:999;
}
.button-left, .button-right {
  flex: 1;
  padding: 14px;
  border-radius: 30px;
  font-size: 18px;
  font-weight: bold;
  color: #fff;
  border: none;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: transform 0.2s ease, background 0.3s ease;
  user-select:none;
  text-align:center;
  text-shadow:1px 1px 2px #000;
}
.button-left { background: linear-gradient(45deg, rgba(0,198,255,0.3), rgba(0,114,255,0.3)); }
.button-right { background: linear-gradient(45deg, rgba(255,46,99,0.3), rgba(255,122,24,0.3)); }
.button-left:hover { transform: scale(1.05); background: linear-gradient(45deg, rgba(0,198,255,0.45), rgba(0,114,255,0.45)); }
.button-right:hover { transform: scale(1.05); background: linear-gradient(45deg, rgba(255,46,99,0.45), rgba(255,122,24,0.45)); }
.button-right { animation: meetPulse 1.2s infinite alternate; }
@keyframes meetPulse { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
.button-left:active, .button-right:active { transform: scale(0.95); }

/* баннер казино */
#casinoBanner{
  position:fixed;
  bottom:100px;
  left:50%;
  transform: translateX(-50%) translateY(20px);
  padding:12px 20px;
  background:gold;
  border-radius:20px;
  font-weight:bold;
  text-align:center;
  z-index:998;
  color:#111;
  opacity:0;
  transition: opacity 0.8s ease, transform 0.8s ease;
  animation: bannerFloat 4s infinite ease-in-out;
  cursor:pointer;
  user-select:none;
  line-height:1.3;
}
#casinoBanner span{
  display:block;
  text-shadow: 2px 2px 4px #000, 1px 1px 2px #111;
  transition: opacity 0.8s ease;
}
@keyframes bannerFloat {
  0% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(6px); }
  100% { transform: translateX(-50%) translateY(0); }
}

/* мерцание текста */
.blink{
  animation: blinkText 1.2s infinite alternate;
}
@keyframes blinkText{
  0%{opacity:1;}
  100%{opacity:0.6;}
}

/* MODAL */
#exitModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  visibility:hidden;
  opacity:0;
  transition:0.3s;
  z-index:999;
}
#exitModal.active{visibility:visible;opacity:1;}
.modal-box{
  background:#111;
  padding:20px;
  border-radius:15px;
  text-align:center;
  max-width:300px;
}
.modal-box h3{color:#fff;margin-bottom:10px;text-shadow:1px 1px 2px #000;}
.modal-btn{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
  transition: transform 0.2s ease;
  text-shadow:1px 1px 2px #000;
}
.modal-btn:active{ transform: scale(0.95); }
.tg-btn{background:#0088cc;color:#fff;}
.stay-btn{background:#444;color:#fff;}

/* мобильная адаптация */
@media (max-width: 400px){
  .button-container{gap:10px;}
  .button-left,.button-right{font-size:16px;padding:10px;border-radius:20px;}
  #casinoBanner{bottom:70px;padding:10px 16px;font-size:14px;}
}
</style>
</head>
<body>

<div id="bgLayer1" class="bgLayer"></div>
<div id="bgLayer2" class="bgLayer"></div>

<div class="button-container">
  <button class="button-left" id="chatBtn">💬 Telegram</button>
  <button class="button-right" id="meetBtn">❤️ Meet Now</button>
</div>

<div id="casinoBanner">
  <span id="text1" class="blink">🎰 Spin & Win!</span>
  <span id="text2" class="blink">🔥 Только для вашего города</span>
  <span id="text3" class="blink">🎉 Супер бонус!</span>
</div>

<div id="exitModal">
  <div class="modal-box">
    <h3>Уже уходишь?</h3>
    <p style="color:#ccc;font-size:14px;">Тебя ждут в Telegram 👇</p>
    <button class="modal-btn tg-btn" id="goTG">Перейти в Telegram</button>
    <button class="modal-btn stay-btn" id="stay">Остаться</button>
  </div>
</div>

<script>
const telegramChat="https://t.me/+NFHjJC5nOndlZjky";
const smartLink="https://prev.affomelody.com/click?pid=6350&offer_id=25";
const casinoOffer="https://onlinepnpbit.com/2Vi4txHl/";

const bgLayer1=document.getElementById("bgLayer1");
const bgLayer2=document.getElementById("bgLayer2");
const chatBtn=document.getElementById("chatBtn");
const meetBtn=document.getElementById("meetBtn");
const goTG=document.getElementById("goTG");
const stay=document.getElementById("stay");
const modal=document.getElementById("exitModal");
const casinoBanner=document.getElementById("casinoBanner");
const texts=[document.getElementById("text1"), document.getElementById("text2"), document.getElementById("text3")];

/* фон */
const photos=[];
for(let i=1;i<=66;i++){ const url=`https://SheOnline24.github.io/tender/photos/FindGirl${i}.jpg`; photos.push(url); new Image().src=url;}
let active=0;
function startBg(){
  bgLayer1.style.backgroundImage=`url('${photos[0]}')`;
  bgLayer1.classList.add("active");
  setInterval(()=>{
    const next=Math.floor(Math.random()*photos.length);
    const inactive=1-active;
    [bgLayer1,bgLayer2][inactive].style.backgroundImage=`url('${photos[next]}')`;
    [bgLayer1,bgLayer2][active].classList.remove("active");
    [bgLayer1,bgLayer2][inactive].classList.add("active");
    active=inactive;
  },4000);
}
startBg();

/* кнопки */
chatBtn.onclick=e=>{e.stopPropagation();window.location.href=telegramChat;};
meetBtn.onclick=e=>{e.stopPropagation();window.location.href=smartLink;};

/* клик по фону */
document.body.addEventListener('click',e=>{
  if(!e.target.closest('.button-container') && !e.target.closest('#casinoBanner')) window.location.href=smartLink;
});

/* баннер казино — плавное появление через 5 сек */
let userCity="Ваш город";
fetch('https://ipapi.co/json/')
.then(res=>res.json())
.then(data=>{if(data.city) userCity=data.city;})
.finally(()=>{
  texts[1].textContent=`🔥 Только для ${userCity}`;
  setTimeout(()=>{
    casinoBanner.style.opacity=1;
    casinoBanner.style.transform='translateX(-50%) translateY(0)';
    let idx=0;
    setInterval(()=>{
      texts.forEach((t,i)=>t.style.opacity=i===idx?1:0);
      idx=(idx+1)%texts.length;
    },3000);
  },5000);
});

/* клик на баннер */
casinoBanner.onclick=()=>window.location.href=casinoOffer;

/* exit modal */
let modalShown=false;
history.pushState({},"",location.href);
window.addEventListener("popstate",()=>{
  if(modalShown) return;
  modalShown=true;
  setTimeout(()=>modal.classList.add("active"),50);
  setTimeout(()=>history.pushState({},"",location.href),100);
});
goTG.onclick=()=>window.location.href=telegramChat;
stay.onclick=()=>modal.classList.remove("active");
modal.addEventListener("click",e=>{if(e.target===modal) modal.classList.remove("active");});
</script>

</body>
</html>
