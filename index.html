<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Tonight</title>
<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
  background:#0e1621;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:20px;
  cursor:pointer;
}

/* фон */
.bgLayer{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:center/cover no-repeat;
  transition:opacity 1s ease, transform 4s linear;
  z-index:-1;
  opacity:0;
  transform:scale(1.12);
}
.bgLayer.active{opacity:1;transform:scale(1);}

/* кнопки контейнер */
.button-container{
  display:flex;
  width:90%;
  max-width:600px;
  gap:20px;
  z-index:999;
}
.button-left, .button-right, .casino-btn{
  flex:1;
  padding:14px;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  color:#fff;
  border:none;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition: transform 0.2s ease, background 0.3s ease;
  user-select:none;
  text-align:center;
  text-shadow:1px 1px 2px #000;
}
.button-left { background: linear-gradient(45deg, rgba(0,198,255,0.3), rgba(0,114,255,0.3)); }
.button-right { background: linear-gradient(45deg, rgba(255,46,99,0.3), rgba(255,122,24,0.3)); animation: meetPulse 1.2s infinite alternate;}
.casino-btn{
  background: rgba(255,215,0,0.25); /* полупрозрачная желтая */
  color:#111;
  opacity:0;
  pointer-events:none;
}
@keyframes meetPulse {0%{transform:scale(1);}100%{transform:scale(1.08);}}
.button-left:hover, .button-right:hover, .casino-btn:hover {transform: scale(1.05);}
.button-left:active, .button-right:active, .casino-btn:active {transform: scale(0.95);}

/* MODAL */
#exitModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  visibility:hidden;
  opacity:0;
  transition:0.3s;
  z-index:999;
}
#exitModal.active{visibility:visible;opacity:1;}
.modal-box{
  background:#111;
  padding:20px;
  border-radius:15px;
  text-align:center;
  max-width:300px;
}
.modal-box h3{color:#fff;margin-bottom:10px;text-shadow:1px 1px 2px #000;}
.modal-btn{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
  transition: transform 0.2s ease;
  text-shadow:1px 1px 2px #000;
}
.modal-btn:active{ transform: scale(0.95); }
.tg-btn{background:#0088cc;color:#fff;}
.stay-btn{background:#444;color:#fff;}

/* мобильная адаптация */
@media (max-width: 400px){
  .button-container{gap:10px;}
  .button-left,.button-right,.casino-btn{font-size:16px;padding:10px;border-radius:20px;}
}
</style>
</head>
<body>

<div id="bgLayer1" class="bgLayer"></div>
<div id="bgLayer2" class="bgLayer"></div>

<!-- Казино кнопка -->
<div class="button-container" style="margin-bottom:10px;">
  <button class="casino-btn" id="casinoBanner"></button>
</div>

<!-- Основные кнопки -->
<div class="button-container">
  <button class="button-left" id="chatBtn">💬 Telegram</button>
  <button class="button-right" id="meetBtn">❤️ Meet Now</button>
</div>

<div id="exitModal">
  <div class="modal-box">
    <h3>Уже уходишь?</h3>
    <p style="color:#ccc;font-size:14px;">Тебя ждут в Telegram 👇</p>
    <button class="modal-btn tg-btn" id="goTG">Перейти в Telegram</button>
    <button class="modal-btn stay-btn" id="stay">Остаться</button>
  </div>
</div>

<script>
const telegramChat="https://t.me/+NFHjJC5nOndlZjky";
const smartLink="https://prev.affomelody.com/click?pid=6350&offer_id=25";
const casinoOffer="https://onlinepnpbit.com/2Vi4txHl/";

const bgLayer1=document.getElementById("bgLayer1");
const bgLayer2=document.getElementById("bgLayer2");
const chatBtn=document.getElementById("chatBtn");
const meetBtn=document.getElementById("meetBtn");
const goTG=document.getElementById("goTG");
const stay=document.getElementById("stay");
const casinoBanner=document.getElementById("casinoBanner");

/* фон */
const photos=[];
for(let i=1;i<=66;i++){ const url=`https://SheOnline24.github.io/tender/photos/FindGirl${i}.jpg`; photos.push(url); new Image().src=url;}
let active=0;
function startBg(){
  bgLayer1.style.backgroundImage=`url('${photos[0]}')`;
  bgLayer1.classList.add("active");
  setInterval(()=>{
    const next=Math.floor(Math.random()*photos.length);
    const inactive=1-active;
    [bgLayer1,bgLayer2][inactive].style.backgroundImage=`url('${photos[next]}')`;
    [bgLayer1,bgLayer2][active].classList.remove("active");
    [bgLayer1,bgLayer2][inactive].classList.add("active");
    active=inactive;
  },4000);
}
startBg();

/* кнопки */
chatBtn.onclick=e=>{e.stopPropagation();window.location.href=telegramChat;};
meetBtn.onclick=e=>{e.stopPropagation();window.location.href=smartLink;};

/* клик по фону */
document.body.addEventListener('click',e=>{
  if(!e.target.closest('.button-container') && !e.target.closest('#casinoBanner')) window.location.href=smartLink;
});

/* казино кнопка с текстом через 3 сек */
let userCity="Ваш город";
fetch('https://ipapi.co/json/')
  .then(res=>res.json())
  .then(data=>{if(data.city) userCity=data.city;})
  .finally(()=>{
    const phrases=[
      "🎰 Spin & Win!",
      `🔥 Только для ${userCity}`,
      "🎉 Супер бонус!"
    ];
    let idx=0;
    setTimeout(()=>{
      casinoBanner.style.opacity=1;
      casinoBanner.style.pointerEvents="auto";
      casinoBanner.textContent = phrases[idx];
      setInterval(()=>{
        idx=(idx+1)%phrases.length;
        casinoBanner.textContent = phrases[idx];
      },3000);
    },5000); // появление через 5 секунд
  });

casinoBanner.onclick=()=>window.location.href=casinoOffer;

/* exit modal: с поддержкой мобильников */
let modalShown=false;
function showExitModal(){
  if(modalShown) return;
  modalShown=true;
  modal.classList.add("active");
}

history.pushState({},"",location.href);

// ПК: попытка вернуться назад
window.addEventListener("popstate",()=>{ showExitModal(); setTimeout(()=>history.pushState({},"",location.href),100); });

// Мобильные: сворачивание вкладки или уход с сайта
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState === "hidden") showExitModal();
});

goTG.onclick=()=>window.location.href=telegramChat;
stay.onclick=()=>modal.classList.remove("active");
modal.addEventListener("click",e=>{if(e.target===modal) modal.classList.remove("active");});

</script>

</body>
</html>
