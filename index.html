<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Tonight</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0e1621;
  height:100vh;
  display:flex;
  overflow:hidden;
  cursor:pointer;
}

/* LEFT COLUMN */
.column{
  position:fixed;
  top:50%;
  left:20px;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* AVATAR CIRCLE */
.avatar{
  position:relative;
  width:70px;
  height:70px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 4px 15px rgba(0,0,0,0.6);
  cursor:pointer;
  transition: transform .3s, box-shadow .3s;
}
.avatar:hover{
  transform:scale(1.15);
  box-shadow:0 6px 25px rgba(0,255,106,0.7);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ONLINE DOT */
.online{
  position:absolute;
  bottom:4px;
  right:4px;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#00ff6a;
  box-shadow:0 0 6px #00ff6a;
  border:2px solid #0e1621;
  animation:blink 2s infinite;
}

/* Online dot blinking */
@keyframes blink{
  0%, 50%, 100%{opacity:1}
  25%, 75%{opacity:0.4}
}
</style>
</head>
<body>

<div class="column" id="column"></div>

<script>
const OFFER="https://tone.affomelody.com/click?pid=6350&offer_id=25&sub1=Online24";

const names=[
"Anna","Mila","Sofia","Emma","Julia","Sara","Laura","Nina",
"Olivia","Isabella","Chloe","Amelia","Maya","Lea","Lily",
"Zoey","Hannah","Ella","Ava","Mia"
];

/* Генерация уникальных фото женщин */
function getUniquePhotos(count){
  const usedIds = new Set();
  const photos = [];
  while(photos.length < count){
    const id = Math.floor(Math.random()*1000)+1;
    if(!usedIds.has(id)){
      usedIds.add(id);
      photos.push("https://randomuser.me/api/portraits/women/"+id+".jpg");
    }
  }
  return photos;
}

/* Загрузка девушек */
function loadGirls(){
  const col=document.getElementById("column");
  col.innerHTML="";
  const photos = getUniquePhotos(7);
  for(let i=0;i<7;i++){
    const photo = photos[i];
    const name = names[Math.floor(Math.random()*names.length)];
    const avatar=document.createElement("div");
    avatar.className="avatar";
    avatar.title=name;
    avatar.onclick=()=>{ window.location.href=OFFER; };
    avatar.innerHTML=`
      <img src="${photo}">
      <div class="online"></div>
    `;
    col.appendChild(avatar);
  }
}

/* Первый заход */
loadGirls();

/* Клик по пустому месту */
document.body.addEventListener("click",(e)=>{
  if(!e.target.closest(".avatar")){
    window.location.href=OFFER;
  }
});
</script>

</body>
</html>
