<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Find Someone Tonight</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0e1621;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
cursor:pointer;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:16px;
width:90vw;
max-width:720px;
height:80vh;
}

/* CARD */

.card{
position:relative;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
cursor:pointer;
transform:scale(0.95);
opacity:0;
animation:fade 0.6s forwards;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* INFO */

.info{
position:absolute;
bottom:0;
left:0;
right:0;
padding:18px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
color:white;
font-size:20px;
font-weight:bold;
}

/* ANIMATION */

@keyframes fade{
to{
opacity:1;
transform:scale(1);
}
}

</style>

</head>

<body>

<div class="grid" id="grid"></div>

<script>

/* OFFER */

const OFFER="https://tone.affomelody.com/click?pid=6350&offer_id=25&sub1=Online24";

/* NAMES */

const names=[
"Anna","Mila","Sofia","Emma","Julia","Sara","Laura","Nina",
"Olivia","Isabella","Chloe","Amelia","Maya","Lea","Lily",
"Zoey","Hannah","Ella","Ava","Mia"
];

/* LOAD GIRLS */

async function loadGirls(){

const grid=document.getElementById("grid");

grid.innerHTML="";

/* получаем 4 женщины */

const res=await fetch("https://randomuser.me/api/?results=4&gender=female&inc=picture");

const data=await res.json();

data.results.forEach(user=>{

const photo=user.picture.large;

const name=names[Math.floor(Math.random()*names.length)];

const age=Math.floor(Math.random()*8)+22;

const card=document.createElement("div");

card.className="card";

card.onclick=()=>{

window.location.href=OFFER;

};

card.innerHTML=`
<img src="${photo}">
<div class="info">${name}, ${age}</div>
`;

grid.appendChild(card);

});

}

/* FIRST LOAD */

loadGirls();

/* CHANGE EVERY 5 SECONDS */

setInterval(loadGirls,5000);

/* CLICK ANYWHERE */

document.body.addEventListener("click",(e)=>{

if(!e.target.closest(".card")){

window.location.href=OFFER;

}

});

</script>

</body>
</html>
