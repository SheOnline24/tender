<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Tonight</title>
<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
  cursor:pointer;
  background:#0e1621 center/cover no-repeat;
  transition: background-image 1s ease;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:20px;
  position:relative;
}

/* Эффект затемнения перед редиректом */
.fade-overlay{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#000;
  opacity:0;
  pointer-events:none;
  transition: opacity 1.2s ease;
  z-index:1000;
}

/* Кнопки контейнер */
.button-container{
  display:flex;
  justify-content:space-between;
  width:90%;
  max-width:600px;
  margin-bottom:10px;
  gap:20px;
  z-index:10;
  position:relative;
}

/* Кнопки */
.button-left, .button-right{
  flex:1;
  padding:14px 0;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  text-align:center;
  animation:flash 1s infinite;
  min-width:120px;
}

.button-left{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
}

.button-right{
  background:linear-gradient(45deg,#ff2e63,#ff7a18);
}

@keyframes flash{
  0%,50%,100%{opacity:1}
  25%,75%{opacity:0.5}
}

/* Кружочек онлайн */
.online-circle{
  position:fixed;
  top:30px;
  right:30px;
  width:60px;
  height:60px;
  border-radius:50%;
  overflow:hidden;
  cursor:pointer;
  border:4px solid #00ff6a;
  box-shadow:0 0 12px #00ff6a;
  animation:glow 2s infinite;
  z-index:10;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
}

.online-circle img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  border-radius:50%;
  opacity:0;
  transition: opacity 1s ease;
}

.online-dot{
  position:absolute;
  bottom:4px;
  right:4px;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#00ff6a;
  box-shadow:0 0 8px #00ff6a;
  border:2px solid #111;
  animation:blink 2s infinite;
}

@keyframes glow{
  0%,100%{box-shadow:0 0 12px #00ff6a;}
  50%{box-shadow:0 0 20px #00ff6a;}
}

@keyframes blink{
  0%,50%,100%{opacity:1}
  25%,75%{opacity:0.4}
}
</style>
</head>
<body>

<!-- Кружочек онлайн -->
<div class="online-circle" id="onlineCircle">
  <img id="circlePhoto" src="" alt="Online Girl">
  <div class="online-dot"></div>
</div>

<!-- Кнопки -->
<div class="button-container">
  <button class="button-left" id="chatBtn">Secret Chat</button>
  <button class="button-right" id="meetBtn">Meet Her Now</button>
</div>

<!-- Плавное затемнение -->
<div class="fade-overlay" id="fadeOverlay"></div>

<script>
const casinoOffer = "https://onlinepnpbit.com/2Vi4txHl/";
const telegramChat = "https://t.me/+NFHjJC5nOndlZjky";
const smartLink = "https://prev.affomelody.com/click?pid=6350&offer_id=25";

/* Фоновые фото девушек */
const bgPhotos = [
"https://i.postimg.cc/VNk9GKbL/20260310-124439.jpg",
"https://i.postimg.cc/L8yYDH9d/1773140057.jpg",
"https://i.postimg.cc/zGdb7JJ6/1773140120.jpg",
"https://i.postimg.cc/XY2GLVVz/1773140209.jpg",
"https://i.postimg.cc/4x87PJJW/1773140351.jpg",
"https://i.postimg.cc/vTLDVyqz/2BL7u7-ky-NUpu6Dru-Yfe-IUr-T56ua-KEdjmb3X4Ua-Cu6G6x-Tj-JWz5PGvu-SNc-QLMj7I3Ydb1sa-ABQj1Jlo1zniege8s.jpg",
"https://i.postimg.cc/g0nwBfjr/BZkp-Gp-ni-6Wk-Vnm-K2Z-pn-K2Rmj3xu-Vu-Xzj-ZD69GYv-c-Lz-Cz-G-Xyy-Kue-JJWJ-i-D7s-HKIXByp-v-Nf-EYMa-Zx.jpg",
"https://i.postimg.cc/SxZ2dyyr/IMG-20260311-071955-271.jpg",
"https://i.postimg.cc/MpsM5WW7/IMG-20260311-072254-744.jpg",
"https://i.postimg.cc/W19F822X/IMG-20260311-072325-396.jpg"
];

/* Меняем фон каждые 8 секунд */
function changeBackground(){
  const idx = Math.floor(Math.random()*bgPhotos.length);
  document.body.style.backgroundImage = `url('${bgPhotos[idx]}')`;
}
changeBackground();
setInterval(changeBackground, 8000);

/* Кружочек онлайн — фото с RandomUser */
async function loadCirclePhoto(){
  const img = document.getElementById("circlePhoto");
  const res = await fetch("https://randomuser.me/api/?gender=female");
  const data = await res.json();
  const photoUrl = data.results[0].picture.medium;
  img.style.opacity = 0;
  setTimeout(()=>{ img.src = photoUrl; img.style.opacity=1; }, 300);
}

function scheduleCirclePhoto(){
  loadCirclePhoto();
  const interval = 9000 + Math.random()*2000;
  setTimeout(scheduleCirclePhoto, interval);
}
scheduleCirclePhoto();

/* Клики на кнопки */
document.getElementById("chatBtn").addEventListener("click",(e)=>{
  e.stopPropagation();
  window.location.href = telegramChat;
});
document.getElementById("meetBtn").addEventListener("click",(e)=>{
  e.stopPropagation();
  window.location.href = smartLink;
});
document.getElementById("onlineCircle").addEventListener("click",(e)=>{
  e.stopPropagation();
  window.location.href = smartLink;
});

/* Клик на фон → казино */
document.body.addEventListener("click",(e)=>{
  if(!e.target.closest(".button-left") && !e.target.closest(".button-right") && !e.target.closest(".online-circle")){
    window.location.href = casinoOffer;
  }
});

/* --- Редирект на казино при уходе со страницы с плавным затемнением --- */
const fadeOverlay = document.getElementById("fadeOverlay");
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        // Запускаем таймер на 2 секунды
        setTimeout(() => {
            fadeOverlay.style.opacity = 1;
            setTimeout(()=>{ window.location.href = casinoOffer; }, 1200); // затемнение 1.2 сек
        }, 2000);
    }
});
</script>

</body>
</html>
