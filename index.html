<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Dating</title>

<style>

body{
margin:0;
height:100vh;
background-size:cover;
background-position:center;
font-family:Arial;
cursor:pointer;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
}

/* кнопка знакомства */

.btn{
position:fixed;
bottom:40px;
right:40px;
background:#ff2a6d;
color:white;
padding:18px 32px;
font-size:20px;
border-radius:50px;
text-decoration:none;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
z-index:10;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

/* казино баннер */

.casino{
position:fixed;
bottom:40px;
left:40px;
background:#111;
color:white;
padding:14px 20px;
border-radius:12px;
font-size:16px;
display:none;
z-index:10;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.casino a{
color:#ffd700;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="overlay"></div>

<a class="btn" href="https://prev.affomelody.com/click?pid=6350&offer_id=25" target="_blank">
❤️ Смотреть анкеты
</a>

<div class="casino" id="casino">
🎰 Хочешь бонус?  
<a href="https://onlinepnpbit.com/2Vi4txHl/" target="_blank">Играть в казино</a>
</div>

<script>

/* фото */

const girls=[

"https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=1200",
"https://images.unsplash.com/photo-1517841905240-472988babdf9?w=1200",
"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=1200",
"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=1200"

];

let g=girls[Math.floor(Math.random()*girls.length)];

document.body.style.backgroundImage="url("+g+")";

/* баннер казино через 12 сек */

setTimeout(()=>{

document.getElementById("casino").style.display="block";

},12000);

/* клик по экрану */

document.body.addEventListener("click",function(e){

if(!e.target.closest("a")){
window.location.href="https://prev.affomelody.com/click?pid=6350&offer_id=25";
}

});

</script>

</body>
</html>
