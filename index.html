<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Tonight</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0e1621;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  cursor:pointer;
}

/* КРУЖОК ПО ЦЕНТРУ */
.avatar-center{
  position:relative;
  width:250px;
  height:250px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 8px 35px rgba(0,0,0,0.6);
  cursor:pointer;
  transition:transform .3s;
}

.avatar-center:hover{
  transform:scale(1.05);
}

.avatar-center img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ОНЛАЙН ДОТИК */
.online{
  position:absolute;
  bottom:12px;
  right:12px;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#00ff6a;
  box-shadow:0 0 8px #00ff6a;
  border:2px solid #0e1621;
  animation:blink 2s infinite;
}

@keyframes blink{
  0%,50%,100%{opacity:1}
  25%,75%{opacity:0.4}
}

/* МОРГАЮЩАЯ КНОПКА */
.cta{
  position:absolute;
  bottom:60px;
  background:linear-gradient(45deg,#ff2e63,#ff7a18);
  padding:14px 28px;
  border-radius:30px;
  font-size:20px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  animation:flash 1s infinite;
}

@keyframes flash{
  0%,50%,100%{opacity:1}
  25%,75%{opacity:0.5}
}
</style>
</head>
<body>

<div class="avatar-center" id="avatar">
  <img id="photo" src="">
  <div class="online"></div>
</div>

<div class="cta" id="ctaBtn">Click Here ❤️</div>

<script>
const OFFER="https://tone.affomelody.com/click?pid=6350&offer_id=25&sub1=Online24";

/* Получаем фото женщины через randomuser.me */
async function loadGirl(){
  try{
    const res = await fetch("https://randomuser.me/api/?gender=female&inc=picture,name&noinfo");
    const data = await res.json();
    const user = data.results[0];
    const photoEl = document.getElementById("photo");
    photoEl.src = user.picture.large;
    photoEl.alt = user.name.first;
  }catch(e){
    console.log("Ошибка загрузки фото:",e);
  }
}

/* Первый заход */
loadGirl();

/* Меняем каждые 7 секунд */
setInterval(loadGirl,7000);

/* Клик на фото */
document.getElementById("avatar").addEventListener("click",()=>{
  window.location.href = OFFER;
});

/* Клик на кнопку */
document.getElementById("ctaBtn").addEventListener("click",(e)=>{
  e.stopPropagation();
  window.location.href = OFFER;
});

/* Клик на весь экран */
document.body.addEventListener("click",(e)=>{
  if(!e.target.closest("#avatar") && !e.target.closest("#ctaBtn")){
    window.location.href = OFFER;
  }
});
</script>

</body>
</html>
