<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meet Someone</title>
<style>
  body, html {
    margin:0;
    padding:0;
    height:100%;
    font-family:Arial, sans-serif;
    overflow:hidden;
  }
  #bg {
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    filter:brightness(0.85);
    transition: background-image 0.5s ease;
  }
  #btn {
    position:fixed;
    bottom:30px;
    right:30px;
    padding:16px 28px;
    font-size:18px;
    border:none;
    border-radius:30px;
    color:white;
    background:linear-gradient(45deg,#ff2e63,#ff7a18);
    box-shadow:0 0 20px rgba(255,46,99,0.8);
    cursor:pointer;
    opacity:0;
    transform:scale(0.9);
    transition:0.4s;
  }
  #btn.show {
    opacity:1;
    transform:scale(1);
  }
  #nameTag {
    position:fixed;
    bottom:90px;
    right:30px;
    font-size:22px;
    color:white;
    text-shadow:0 0 10px black;
    font-weight:bold;
  }
</style>
</head>
<body>

<div id="bg"></div>
<div id="nameTag"></div>
<button id="btn">Meet Now ❤️</button>

<script>
const DATING="https://kfl2prr.datelovelygirls.com/vv6pzuc?s1=Online24";

// Рандомное имя девушки
const names=["Anna","Mila","Sofia","Emma","Lena","Julia","Sara","Laura","Nina"];
let girl = names[Math.floor(Math.random()*names.length)];
document.getElementById("nameTag").innerText = girl;

// Рандомное фото девушки
let avatarId = Math.floor(Math.random()*90);
document.getElementById("bg").style.backgroundImage = "url('https://randomuser.me/api/portraits/women/"+avatarId+".jpg')";

// Появление кнопки с анимацией через 1.5s
let btn=document.getElementById("btn");
setTimeout(()=>{ btn.classList.add("show"); },1500);

// Клик по кнопке ведет на партнёрку
btn.onclick = ()=>{ window.location.href = DATING; };

// Можно сделать также клик по всей странице
document.getElementById("bg").onclick = ()=>{ window.location.href = DATING; };
</script>

</body>
</html>
