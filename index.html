<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Tonight</title>
<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
  background:#0e1621;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:20px;
}
.bgLayer{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:center/cover no-repeat;
  transition:opacity 0.8s ease, transform 4s linear;
  z-index:-1;
  opacity:0;
  transform:scale(1.12);
}
.bgLayer.active{opacity:1;transform:scale(1);}
.button-container{
  display:flex;
  width:90%;
  max-width:600px;
  gap:20px;
}
.button-left,.button-right{
  flex:1;
  padding:14px;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  color:white;
  border:none;
  cursor:pointer;
}
.button-left{background:linear-gradient(45deg,#00c6ff,#0072ff);}
.button-right{background:linear-gradient(45deg,#ff2e63,#ff7a18);}
#casinoBanner{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translate(-50%,30px);
  padding:12px 20px;
  background:gold;
  border-radius:20px;
  opacity:0;
  cursor:pointer;
  transition:opacity 0.8s ease, transform 0.8s ease;
  font-weight:bold;
  text-align:center;
  z-index:998;
}
#exitModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  visibility:hidden;
  opacity:0;
  transition:0.3s;
  z-index:999;
}
#exitModal.active{visibility:visible;opacity:1;}
.modal-box{
  background:#111;
  padding:20px;
  border-radius:15px;
  text-align:center;
  max-width:300px;
}
.modal-box h3{color:#fff;margin-bottom:10px;}
.modal-btn{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}
.tg-btn{background:#0088cc;color:#fff;}
.stay-btn{background:#444;color:#fff;}
</style>
</head>
<body>

<div id="bgLayer1" class="bgLayer"></div>
<div id="bgLayer2" class="bgLayer"></div>

<div class="button-container">
  <button class="button-left" id="chatBtn">💬 Telegram</button>
  <button class="button-right" id="meetBtn">❤️ Meet Now</button>
</div>

<div id="casinoBanner"></div>

<!-- MODAL -->
<div id="exitModal">
  <div class="modal-box">
    <h3>Уже уходишь?</h3>
    <p style="color:#ccc;font-size:14px;">Тебя ждут в Telegram 👇</p>
    <button class="modal-btn tg-btn" id="goTG">Перейти в Telegram</button>
    <button class="modal-btn stay-btn" id="stay">Остаться</button>
  </div>
</div>

<script>
const telegramChat="https://t.me/+NFHjJC5nOndlZjky";
const smartLink="https://prev.affomelody.com/click?pid=6350&offer_id=25";
const casinoOffer="https://onlinepnpbit.com/2Vi4txHl/";

const bgLayer1 = document.getElementById("bgLayer1");
const bgLayer2 = document.getElementById("bgLayer2");
const casinoBanner = document.getElementById("casinoBanner");
const chatBtn = document.getElementById("chatBtn");
const meetBtn = document.getElementById("meetBtn");
const goTG = document.getElementById("goTG");
const stay = document.getElementById("stay");
const modal = document.getElementById("exitModal");

/* фон */
const photos=[];
for(let i=1;i<=66;i++){
  const url=`https://SheOnline24.github.io/tender/photos/FindGirl${i}.jpg`;
  photos.push(url);
  new Image().src=url; // предзагрузка
}
const layers=[bgLayer1,bgLayer2];
let active=0;
function startBg(){
  layers[0].style.backgroundImage=`url('${photos[0]}')`;
  layers[0].classList.add("active");
  setInterval(()=>{
    const next=Math.floor(Math.random()*photos.length);
    const inactive=1-active;
    layers[inactive].style.backgroundImage=`url('${photos[next]}')`;
    layers[active].classList.remove("active");
    layers[inactive].classList.add("active");
    active=inactive;
  },3000);
}
startBg();

/* кнопки */
chatBtn.onclick=(e)=>{e.stopPropagation();window.location.href=telegramChat;};
meetBtn.onclick=(e)=>{e.stopPropagation();window.location.href=smartLink;};

/* Получаем город через бесплатный API */
let userCity="Ваш город";
fetch('https://ipapi.co/json/')
.then(res=>res.json())
.then(data=>{
  if(data.city) userCity=data.city;
})
.finally(()=>initCasinoBanner());

/* баннер казино */
function initCasinoBanner(){
  casinoBanner.style.opacity=1;
  casinoBanner.style.transform="translate(-50%,0)";
  let flashCount=0;
  const flashTexts=["🎰 Spin & Win!",`🔥 Только для ${userCity}`,"🎉 Супер бонус!"];
  const flashInterval=setInterval(()=>{
    casinoBanner.textContent = flashTexts[flashCount%flashTexts.length];
    flashCount++;
    if(flashCount>6){
      clearInterval(flashInterval);
      casinoBanner.textContent="🎰 Bonus";
    }
  },500);
  casinoBanner.onclick=(e)=>{e.stopPropagation();window.location.href=casinoOffer;};
}

/* плавная анимация баннера */
let bannerDir=0;
function animateBanner(){
  bannerDir = bannerDir===0?2:0;
  casinoBanner.style.transform=`translate(-50%,${bannerDir}px)`;
  requestAnimationFrame(animateBanner);
}
animateBanner();

/* пульс кнопки Meet */
let meetScale=1;
function pulseMeet(){
  meetScale = meetScale===1?1.08:1;
  document.querySelector(".button-right").style.transform=`scale(${meetScale})`;
  setTimeout(pulseMeet,6000);
}
pulseMeet();

/* exit modal — iOS friendly */
let modalShown=false;
history.pushState({},"",location.href);
window.addEventListener("popstate",()=>{
  if(modalShown) return;
  modalShown=true;
  setTimeout(()=>modal.classList.add("active"),50);
  setTimeout(()=>history.pushState({}, "", location.href),100);
});
goTG.onclick=()=>window.location.href=telegramChat;
stay.onclick=()=>modal.classList.remove("active");
modal.addEventListener("click",(e)=>{if(e.target===modal)modal.classList.remove("active");});

/* Telegram mini-dodge */
setTimeout(()=>{
  const tg=document.createElement("div");
  tg.innerText="💬 Open Telegram";
  Object.assign(tg.style,{
    position:"fixed",
    bottom:"15px",
    left:"50%",
    transform:"translateX(-50%)",
    background:"#0088cc",
    color:"#fff",
    padding:"6px 14px",
    borderRadius:"20px",
    fontSize:"13px",
    zIndex:999
  });
  tg.onclick=()=>window.location.href=telegramChat;
  document.body.appendChild(tg);
},8000);
</script>

</body>
</html>
