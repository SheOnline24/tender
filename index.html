<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Tonight</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
  cursor:pointer;
  background:#0e1621 center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:20px;
}

/* фон */
#bgLayer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:center/cover no-repeat;

  opacity:0;
  transform:scale(1.12);
  transition:opacity 0.8s ease, transform 4s linear;
  z-index:-1;
}

/* кнопки */
.button-container{
  display:flex;
  width:90%;
  max-width:600px;
  gap:20px;
  margin-bottom:10px;
  z-index:10;
}

.button-left,.button-right{
  flex:1;
  padding:14px 0;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  color:white;
  border:none;
  animation:flash 1.5s infinite;
  transition:transform 0.3s ease;
}

.button-left{background:linear-gradient(45deg,#00c6ff,#0072ff);}
.button-right{background:linear-gradient(45deg,#ff2e63,#ff7a18);}

@keyframes flash{
  0%,50%,100%{opacity:1}
  25%,75%{opacity:.65}
}

.button-left:active,
.button-right:active{
  transform:scale(0.95);
}

/* баннер */
#casinoBanner{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translate(-50%,30px);
  padding:15px 25px;
  background:linear-gradient(45deg,#ffd700,#ffb700);
  color:#000;
  font-size:20px;
  font-weight:bold;
  border-radius:25px;
  cursor:pointer;

  opacity:0;
  visibility:hidden;

  transition:all 0.6s ease;

  animation:bannerGlow 2s infinite;
  animation-play-state:paused;

  max-width:90%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  z-index:50;
}

@keyframes bannerGlow{
  0%,100%{opacity:1}
  50%{opacity:.85}
}
</style>
</head>

<body>

<div id="bgLayer"></div>

<div class="button-container">
  <button class="button-left" id="chatBtn">Secret Chat</button>
  <button class="button-right" id="meetBtn">Meet Her Now</button>
</div>

<div id="casinoBanner">🎁 Получи бонус!</div>

<script>
const casinoOffer="https://onlinepnpbit.com/2Vi4txHl/";
const telegramChat="https://t.me/+NFHjJC5nOndlZjky";
const smartLink="https://prev.affomelody.com/click?pid=6350&offer_id=25";

/* 66 фото */
const bgPhotos=[];
for(let i=1;i<=66;i++){
  bgPhotos.push(`https://SheOnline24.github.io/tender/photos/FindGirl${i}.jpg`);
}

/* предзагрузка */
bgPhotos.forEach(src=>{
  const img=new Image();
  img.src=src;
});

/* фон */
const bgLayer=document.getElementById("bgLayer");
let currentIndex=0;

/* сразу первый кадр */
bgLayer.style.backgroundImage=`url('${bgPhotos[0]}')`;
bgLayer.style.opacity=1;

/* смена фона с лёгким параллакс-zoom */
function changeBackground(){
  let next;
  do{ next=Math.floor(Math.random()*bgPhotos.length); } while(next===currentIndex);

  const img=new Image();
  img.src=bgPhotos[next];
  img.onload=()=>{
    bgLayer.style.transition="none";
    bgLayer.style.opacity=0;
    bgLayer.style.transform="scale(1.12)";
    bgLayer.style.backgroundImage=`url('${bgPhotos[next]}')`;

    setTimeout(()=>{
      bgLayer.style.transition="opacity 0.8s ease, transform 4s linear";
      bgLayer.style.opacity=1;
      bgLayer.style.transform="scale(1)";
    },50);

    currentIndex=next;
  };
}

/* смена каждые 3.5 сек + небольшая случайная задержка для “живости” */
setInterval(()=>{
  setTimeout(changeBackground, Math.random()*400);
},3500);

/* кнопки */
chatBtn.onclick=e=>{e.stopPropagation();location.href=telegramChat;}
meetBtn.onclick=e=>{e.stopPropagation();location.href=smartLink;}

/* основной клик */
document.body.onclick=(e)=>{
  if(!e.target.closest("#casinoBanner")){
    location.href=smartLink;
  }
};

/* микро-триггер кнопки */
function pulseButton(){
  const btn=document.querySelector(".button-right");
  btn.style.transform="scale(1.08)";
  setTimeout(()=>{btn.style.transform="scale(1)";},350);
}

/* цикличная пульсация каждые 6 сек */
setInterval(pulseButton,6000);

/* гео-текст */
async function setText(){
  let country="RU";
  try{
    const r=await fetch("https://ipapi.co/json/");
    const d=await r.json();
    country=d.country_code;
  }catch{}

  const banner=document.getElementById("casinoBanner");
  banner.textContent = (country==="RU") ? "🎁 Получи бонус!" : "🎁 Claim your bonus!";
  adjustFont();
}

function adjustFont(){
  const el=document.getElementById("casinoBanner");
  let size=20;
  el.style.fontSize=size+"px";
  while(el.scrollWidth>el.clientWidth && size>12){
    size--;
    el.style.fontSize=size+"px";
  }
}

setText();

/* баннер */
const banner=document.getElementById("casinoBanner");
setTimeout(()=>{
  banner.style.visibility="visible";
  banner.style.opacity=1;
  banner.style.transform="translate(-50%,0)";
  setTimeout(()=>{banner.style.animationPlayState="running";},500);

  banner.onclick=(e)=>{
    e.stopPropagation();
    location.href=casinoOffer;
  };
},6000); // чуть раньше для захвата внимания

/* редирект на уход с вкладки */
function goTelegram(){location.href=telegramChat;}
document.addEventListener("visibilitychange",()=>{if(document.hidden)setTimeout(goTelegram,1500);});
window.addEventListener("blur",()=>setTimeout(goTelegram,1200));
</script>

</body>
</html>
