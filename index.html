  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:20px;
  position:relative;

/* затемнение */
.fade-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  opacity:0;
  pointer-events:none;
  transition:opacity 1.2s ease;
  z-index:1000;
}

/* кнопки */
.button-container{
  display:flex;
  justify-content:space-between;
  width:90%;
  max-width:600px;
  margin-bottom:10px;
  gap:20px;
  z-index:10;
  position:relative;
}

.button-left,.button-right{
  flex:1;
  padding:14px 0;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  text-align:center;
  animation:flash 1s infinite;
  min-width:120px;
  border:none;
}

.button-left{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
}

.button-right{
  background:linear-gradient(45deg,#ff2e63,#ff7a18);
}

@keyframes flash{
  0%,50%,100%{opacity:1}
  25%,75%{opacity:.5}
}

/* кружок */
.online-circle{
  position:fixed;
  top:30px;
  right:30px;
  width:60px;
  height:60px;
  border-radius:50%;
  overflow:hidden;
  cursor:pointer;
  border:4px solid #00ff6a;
  box-shadow:0 0 12px #00ff6a;
  animation:glow 2s infinite;
  z-index:10;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
}

.online-circle img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
  opacity:0;
  transition:opacity 1s ease;
}

.online-dot{
  position:absolute;
  bottom:4px;
  right:4px;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#00ff6a;
  box-shadow:0 0 8px #00ff6a;
  border:2px solid #111;
  animation:blink 2s infinite;
}

@keyframes glow{
  0%,100%{box-shadow:0 0 12px #00ff6a}
  50%{box-shadow:0 0 20px #00ff6a}
}

@keyframes blink{
  0%,50%,100%{opacity:1}
  25%,75%{opacity:.4}
