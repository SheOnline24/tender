<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body, html {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
  }

  /* Фон на весь экран */
  #background {
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-1;
    filter: brightness(0.9); /* слегка затемнить для кнопки */
  }

  /* Кнопка в правом нижнем углу */
  #ctaBtn {
    position:fixed;
    bottom:30px;
    right:30px;
    padding:18px 28px;
    font-size:20px;
    font-weight:bold;
    color:white;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:linear-gradient(45deg,#ff2e63,#ff7a18);
    box-shadow:0 0 20px rgba(255,46,99,0.8);
    animation:pulse 1.5s infinite;
    transition:0.3s;
    z-index:10;
  }

  #ctaBtn:hover{
    transform:scale(1.1);
    box-shadow:0 0 35px rgba(255,46,99,1);
  }

  @keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
  }
</style>
</head>
<body>

<img id="background">
<button id="ctaBtn">Meet Now ❤️</button>

<script>
const DATING="https://kfl2prr.datelovelygirls.com/vv6pzuc?s1=Online24";

// Функция генерации случайного лица
function randomFace(){
  // thispersondoesnotexist.com генерирует новое лицо каждый раз по seed
  return "https://thispersondoesnotexist.com/image?" + Math.random();
}

// Устанавливаем фон
const bg=document.getElementById("background");
bg.src=randomFace();

// Кнопка кликабельная
document.getElementById("ctaBtn").onclick = ()=>{
  window.location.href = DATING;
}

// Дополнительно: при каждом обновлении страницы — новое лицо
window.onload = ()=>{
  bg.src = randomFace();
}
</script>

</body>
</html>
