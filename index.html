<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Find Someone Tonight</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0e1621;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
cursor:pointer;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
grid-template-rows:repeat(2,1fr);
gap:14px;
width:92vw;
max-width:700px;
height:82vh;
}

/* CARD */

.card{
position:relative;
border-radius:18px;
overflow:hidden;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
cursor:pointer;
transition:transform .4s,opacity .4s;
animation:pulse 3s infinite;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* INFO */

.info{
position:absolute;
bottom:0;
left:0;
right:0;
padding:14px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
color:white;
font-size:18px;
font-weight:bold;
}

/* ONLINE DOT */

.online{
position:absolute;
top:10px;
left:10px;
background:#00ff6a;
width:10px;
height:10px;
border-radius:50%;
box-shadow:0 0 8px #00ff6a;
}

/* FADE */

.fadeOut{
opacity:0;
transform:scale(0.9);
}

.fadeIn{
opacity:1;
transform:scale(1);
}

/* PULSE */

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.03)}
100%{transform:scale(1)}
}

</style>

</head>

<body>

<div class="grid" id="grid"></div>

<script>

const OFFER="https://tone.affomelody.com/click?pid=6350&offer_id=25&sub1=Online24";

/* NAMES */

const names=[
"Anna","Mila","Sofia","Emma","Julia","Sara","Laura","Nina",
"Olivia","Isabella","Chloe","Amelia","Maya","Lea","Lily",
"Zoey","Hannah","Ella","Ava","Mia"
];

/* генерация фото */

function getPhoto(){

const id=Math.floor(Math.random()*1000)+1;

return "https://randomuser.me/api/portraits/women/"+id+".jpg";

}

/* LOAD GIRLS */

function loadGirls(){

const grid=document.getElementById("grid");

const cards=document.querySelectorAll(".card");

cards.forEach(card=>{
card.classList.add("fadeOut");
});

setTimeout(()=>{

grid.innerHTML="";

for(let i=0;i<4;i++){

const photo=getPhoto();

const name=names[Math.floor(Math.random()*names.length)];

const age=Math.floor(Math.random()*8)+22;

const card=document.createElement("div");

card.className="card fadeIn";

card.onclick=()=>{
window.location.href=OFFER;
};

card.innerHTML=`

<div class="online"></div>

<img src="${photo}">

<div class="info">${name}, ${age}</div>

`;

grid.appendChild(card);

}

},400);

}

/* FIRST LOAD */

loadGirls();

/* CHANGE EVERY 7 SECONDS */

setInterval(loadGirls,7000);

/* CLICK ANYWHERE */

document.body.addEventListener("click",(e)=>{

if(!e.target.closest(".card")){

window.location.href=OFFER;

}

});

</script>

</body>
</html>
