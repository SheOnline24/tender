<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Find Someone Tonight</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0e1621;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
cursor:pointer;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:16px;
width:90vw;
max-width:720px;
height:80vh;
}

/* CARD */

.card{
position:relative;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
cursor:pointer;
transform:scale(0.95);
opacity:0;
animation:fade 0.6s forwards;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* INFO */

.info{
position:absolute;
bottom:0;
left:0;
right:0;
padding:18px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
color:white;
font-size:20px;
font-weight:bold;
}

/* ANIMATION */

@keyframes fade{
to{
opacity:1;
transform:scale(1);
}
}

</style>

</head>

<body>

<div class="grid" id="grid"></div>

<script>

/* OFFER */

const OFFER="https://tone.affomelody.com/click?pid=6350&offer_id=25&sub1=Online24";

/* NAMES */

const names=[
"Anna","Mila","Sofia","Emma","Julia","Sara","Laura","Nina",
"Olivia","Isabella","Chloe","Amelia","Maya","Lea","Lily",
"Zoey","Hannah","Ella","Ava","Mia"
];

/* UNSPLASH HD PHOTOS */

const photos=[
"https://images.unsplash.com/photo-1494790108377-be9c29b29330",
"https://images.unsplash.com/photo-1502685104226-ee32379fefbe",
"https://images.unsplash.com/photo-1517841905240-472988babdf9",
"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df",
"https://images.unsplash.com/photo-1524504388940-b1c1722653e1",
"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e",
"https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91",
"https://images.unsplash.com/photo-1519699047748-de8e457a634e",
"https://images.unsplash.com/photo-1500648767791-00dcc994a43e",
"https://images.unsplash.com/photo-1506794778202-cad84cf45f1d"
];

/* GENERATE GIRLS */

function loadGirls(){

const grid=document.getElementById("grid");

grid.innerHTML="";

for(let i=0;i<4;i++){

const photo=photos[Math.floor(Math.random()*photos.length)]+"?w=900&q=90";

const name=names[Math.floor(Math.random()*names.length)];

const age=Math.floor(Math.random()*8)+22;

const card=document.createElement("div");

card.className="card";

card.onclick=()=>{

window.location.href=OFFER;

};

card.innerHTML=`

<img src="${photo}">

<div class="info">${name}, ${age}</div>

`;

grid.appendChild(card);

}

}

/* FIRST LOAD */

loadGirls();

/* CHANGE EVERY 5 SECONDS */

setInterval(loadGirls,5000);

/* CLICK ANYWHERE */

document.body.addEventListener("click",(e)=>{

if(!e.target.closest(".card")){

window.location.href=OFFER;

}

});

</script>

</body>
</html>
