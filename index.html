<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Dating</title>

<style>

body{
margin:0;
height:100vh;
background-size:cover;
background-position:center;
font-family:Arial;
}

.overlay{
position:absolute;
bottom:40px;
right:40px;
}

.btn{
background:#ff2a6d;
color:white;
padding:18px 30px;
font-size:20px;
border-radius:40px;
text-decoration:none;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
background:#ff0f5a;
}

</style>
</head>

<body>

<div class="overlay">
<a class="btn" href="https://ТВОЯ-ПАРТНЕРКА" target="_blank">
💬 Перейти к знакомству
</a>
</div>

<script>

const girls = [

"https://images.pexels.com/photos/415829/pexels-photo-415829.jpeg",
"https://images.pexels.com/photos/774909/pexels-photo-774909.jpeg",
"https://images.pexels.com/photos/1239291/pexels-photo-1239291.jpeg",
"https://images.pexels.com/photos/762020/pexels-photo-762020.jpeg",
"https://images.pexels.com/photos/1130626/pexels-photo-1130626.jpeg",
"https://images.pexels.com/photos/733872/pexels-photo-733872.jpeg",
"https://images.pexels.com/photos/936229/pexels-photo-936229.jpeg",
"https://images.pexels.com/photos/1858175/pexels-photo-1858175.jpeg"

];

const randomGirl = girls[Math.floor(Math.random()*girls.length)];

document.body.style.backgroundImage = "url("+randomGirl+")";

document.body.onclick = () => {
window.location.href="https://ТВОЯ-ПАРТНЕРКА";
};

</script>

</body>
</html>
