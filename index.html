<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Tonight</title>
<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
  cursor:pointer;
  background:#0e1621 url('https://i.postimg.cc/VNk9GKbL/20260310-124439.jpg') center/cover no-repeat; /* оставляем фон */
}

/* Кнопки внизу */
.button-left, .button-right{
  position:fixed;
  bottom:30px;
  padding:14px 28px;
  border-radius:30px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  animation:flash 1s infinite;
  z-index:10;
}

.button-left{
  left:30px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
}

.button-right{
  right:30px;
  background:linear-gradient(45deg,#ff2e63,#ff7a18);
}

@keyframes flash{
  0%,50%,100%{opacity:1}
  25%,75%{opacity:0.5}
}

/* КРУЖОК ОНЛАЙН */
.online-circle{
  position:fixed;
  top:30px;
  right:30px;
  width:70px;
  height:70px;
  border-radius:50%;
  overflow:hidden;
  cursor:pointer;
  border:4px solid #00ff6a;
  box-shadow:0 0 12px #00ff6a;
  animation:glow 2s infinite;
  z-index:10;
}

.online-circle img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  border-radius:50%;
}

@keyframes glow{
  0%,100%{box-shadow:0 0 12px #00ff6a;}
  50%{box-shadow:0 0 20px #00ff6a;}
}
</style>
</head>
<body>

<button class="button-left" id="chatBtn">Secret Chat</button>
<button class="button-right" id="meetBtn">Meet Her Now</button>

<div class="online-circle" id="onlineCircle">
  <img id="circlePhoto" src="" alt="Online Girl">
</div>

<script>
const casinoOffer = "https://onlinepnpbit.com/2Vi4txHl/";
const telegramChat = "https://t.me/+NFHjJC5nOndlZjky";
const smartLink = "https://prev.affomelody.com/click?pid=6350&offer_id=25";

/* Рандомайзер для кружочка */
function getRandomGirl(){
  return "https://thispersondoesnotexist.com/image?" + Math.random();
}

/* Загружаем фото в кружочек */
function loadCirclePhoto(){
  document.getElementById("circlePhoto").src = getRandomGirl();
}

/* Первый показ */
loadCirclePhoto();

/* Меняем каждые 7 секунд */
setInterval(loadCirclePhoto,7000);

/* Клики на кнопки */
document.getElementById("chatBtn").addEventListener("click",(e)=>{
  e.stopPropagation();
  window.location.href = telegramChat;
});

document.getElementById("meetBtn").addEventListener("click",(e)=>{
  e.stopPropagation();
  window.location.href = smartLink;
});

/* Клик на кружочек */
document.getElementById("onlineCircle").addEventListener("click",(e)=>{
  e.stopPropagation();
  window.location.href = smartLink;
});

/* Клик на фон (всё остальное) */
document.body.addEventListener("click",(e)=>{
  if(!e.target.closest(".button-left") && !e.target.closest(".button-right") && !e.target.closest(".online-circle")){
    window.location.href = casinoOffer;
  }
});
</script>

</body>
</html>
