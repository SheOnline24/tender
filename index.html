<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Girls</title>
<style>
body{
  margin:0;
  height:100vh;
  background-size:cover;
  background-position:center;
  font-family:Arial;
  cursor:pointer;
  transition:background-image 0.8s ease;
}
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.25);
}

/* контейнер кнопок */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  z-index:10;
}

/* кнопки */
.bottom-bar a{
  flex:1;
  padding:18px 0;
  font-size:20px;
  text-align:center;
  text-decoration:none;
  color:white;
  transition:0.3s;
  box-shadow:0 -2px 15px rgba(0,0,0,0.4);
}
.bottom-bar a:hover{
  transform:scale(1.05);
  box-shadow:0 -2px 25px rgba(0,0,0,0.5);
}

/* правая кнопка анкеты */
.dating{
  background:linear-gradient(45deg,#ff2a6d,#ff7a18);
  border-top-left-radius:0;
  border-top-right-radius:0;
}

/* левая кнопка казино */
.casino-btn{
  background:linear-gradient(45deg,#222,#444);
  border-top-left-radius:0;
  border-top-right-radius:0;
}
</style>
</head>
<body>

<div class="overlay"></div>

<div class="bottom-bar">
  <a class="casino-btn" id="casinoBtn" href="#" target="_blank">🎰 Казино</a>
  <a class="dating" href="https://prev.affomelody.com/click?pid=6350&offer_id=25" target="_blank">❤️ Смотреть анкеты</a>
</div>

<script>
// ===== список фото =====
const girls=[
"https://h.uguu.se/TwnXGlCd.jpg",
"https://n.uguu.se/PCKQYJgM.jpg",
"https://n.uguu.se/nowlXmuS.jpg",
"https://d.uguu.se/JtovqVZr.jpg",
"https://d.uguu.se/wUKmXqzL.jpg",
"https://h.uguu.se/gXwuBYwE.jpg",
"https://o.uguu.se/SiaSCtiW.jpg",
"https://h.uguu.se/DhWRXMUb.jpg",
"https://n.uguu.se/PRjDynHd.jpg",
"https://o.uguu.se/ONQdZWkt.jpg"
];
let g=girls[Math.floor(Math.random()*girls.length)];
document.body.style.backgroundImage="url("+g+")";

// ===== казино кнопка =====
const CASINO="https://onlinepnpbit.com/2Vi4txHl/";
const casinoBtn=document.getElementById("casinoBtn");
casinoBtn.style.display="none"; // прячем сначала

setTimeout(()=>{
  casinoBtn.href=CASINO;
  casinoBtn.style.display="block";
},12000); // появляется через 12 сек

// ===== клик по экрану (кроме ссылок) =====
document.body.addEventListener("click",function(e){
  if(!e.target.closest("a")){
    window.location.href="https://prev.affomelody.com/click?pid=6350&offer_id=25";
  }
});
</script>

</body>
</html>
