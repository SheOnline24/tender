<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Tonight</title><style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
  cursor:pointer;
  background:#0e1621 center/cover no-repeat;
  transition: background-image 1s ease;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:20px;
  position:relative;
}

.fade-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  opacity:0;
  pointer-events:none;
  transition:opacity 1s ease;
  z-index:1000;
}

.button-container{
  display:flex;
  justify-content:space-between;
  width:90%;
  max-width:600px;
  margin-bottom:10px;
  gap:20px;
  z-index:10;
}

.button-left,.button-right{
  flex:1;
  padding:14px 0;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  text-align:center;
  animation:flash 1s infinite;
  border:none;
}

.button-left{background:linear-gradient(45deg,#00c6ff,#0072ff);} 
.button-right{background:linear-gradient(45deg,#ff2e63,#ff7a18);} 

@keyframes flash{
  0%,50%,100%{opacity:1}
  25%,75%{opacity:.5}
}

.online-circle{
  position:fixed;
  top:30px;
  right:30px;
  width:60px;
  height:60px;
  border-radius:50%;
  overflow:hidden;
  cursor:pointer;
  border:4px solid #00ff6a;
  box-shadow:0 0 12px #00ff6a;
  animation:glow 2s infinite;
  z-index:10;
  background:#111;
}

.online-circle img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
  opacity:0;
  transition:opacity 1s ease;
}

.online-dot{
  position:absolute;
  bottom:4px;
  right:4px;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#00ff6a;
  box-shadow:0 0 8px #00ff6a;
}

@keyframes glow{
  0%,100%{box-shadow:0 0 12px #00ff6a}
  50%{box-shadow:0 0 20px #00ff6a}
}

#counter{
  position:fixed;
  top:10px;
  left:10px;
  color:#0f0;
  font-weight:bold;
  z-index:10;
}

</style></head><body><div id="counter">🔥 1200 online</div><div class="online-circle" id="onlineCircle">
  <img id="circlePhoto">
  <div class="online-dot"></div>
</div><div class="button-container">
  <button class="button-left" id="chatBtn">💬 Chat with her</button>
  <button class="button-right" id="meetBtn">❤️ Meet & Play</button>
</div><div class="fade-overlay" id="fadeOverlay"></div><script>
const casinoOffer="https://onlinepnpbit.com/2Vi4txHl/";
const telegramChat="https://t.me/+NFHjJC5nOndlZjky";
const smartLink="https://prev.affomelody.com/click?pid=6350&offer_id=25";

const bgPhotos = Array.from({length:66},(_,i)=>`https://SheOnline24.github.io/tender/photos/FindGirl${i+1}.jpg`);

function changeBackground(){
  const next = Math.floor(Math.random()*bgPhotos.length);
  const img = new Image();
  img.src = bgPhotos[next];
  img.onload = ()=>{
    document.body.style.backgroundImage = `url('${bgPhotos[next]}')`;
  };
}
changeBackground();
setInterval(changeBackground,8000);

async function loadCirclePhoto(){
  const img=document.getElementById("circlePhoto");
  const res=await fetch("https://randomuser.me/api/?gender=female");
  const data=await res.json();
  img.style.opacity=0;
  setTimeout(()=>{
    img.src=data.results[0].picture.medium;
    img.style.opacity=1;
  },300);
}
(function loop(){loadCirclePhoto();setTimeout(loop,10000)})();

// онлайн счетчик
setInterval(()=>{
  const el=document.getElementById("counter");
  el.innerHTML = "🔥 " + (1100 + Math.floor(Math.random()*300)) + " online";
},3000);

// сценарий (главное улучшение)
function storyFlow(){
  const overlay=document.createElement("div");
  overlay.style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;z-index:9999;text-align:center;padding:20px";
  overlay.innerHTML="<div id='msg'>💬 She is typing...</div>";
  document.body.appendChild(overlay);

  setTimeout(()=>msg.innerHTML="Hey… I’m online 😈",1000);
  setTimeout(()=>msg.innerHTML="Let’s have fun together 🔥",2500);

  setTimeout(()=>{
    if(Math.random()<0.6){
      msg.innerHTML="I have a bonus for you 🎰";
      setTimeout(()=>window.location.href=casinoOffer,1500);
    }else{
      msg.innerHTML="Text me first 💋";
      setTimeout(()=>window.location.href=smartLink,1500);
    }
  },4000);
}

chatBtn.onclick=e=>{e.stopPropagation();window.location.href=telegramChat;};
meetBtn.onclick=e=>{e.stopPropagation();window.location.href=smartLink;};
onlineCircle.onclick=e=>{e.stopPropagation();storyFlow();};

// главный вход
document.body.onclick=e=>{
  if(!e.target.closest("button") && !e.target.closest(".online-circle")){
    storyFlow();
  }
};

// автозапуск через время
setTimeout(storyFlow,7000);

</script></body>
</html>
