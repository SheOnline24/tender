<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Find Someone Tonight</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0e1621;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
overflow:hidden;
cursor:pointer; /* весь экран кликабельный */
}

/* CARD */

.card{
position:absolute;
width:320px;
height:440px;
border-radius:22px;
overflow:hidden;
box-shadow:0 25px 50px rgba(0,0,0,0.6);
background:#000;
touch-action:none;
cursor:grab;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* INFO */

.info{
position:absolute;
bottom:0;
left:0;
right:0;
padding:20px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
}

.name{
font-size:24px;
font-weight:bold;
}

/* LIKE / NOPE LABEL */

.label{
position:absolute;
top:30px;
font-size:32px;
font-weight:bold;
padding:10px 20px;
border:4px solid;
display:none;
}

.likeLabel{
left:20px;
color:#4cff79;
border-color:#4cff79;
transform:rotate(-20deg);
}

.nopeLabel{
right:20px;
color:#ff4c6a;
border-color:#ff4c6a;
transform:rotate(20deg);
}

/* MATCH SCREEN */

#match{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#0e1621;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

#match h1{
font-size:42px;
color:#ff2e63;
}

#match button{
margin-top:30px;
padding:16px 40px;
font-size:20px;
border:none;
border-radius:30px;
cursor:pointer;
background:linear-gradient(45deg,#ff2e63,#ff7a18);
color:white;
}

</style>

</head>

<body>

<div class="card" id="card">
<img id="photo">
<div class="label likeLabel">LIKE</div>
<div class="label nopeLabel">NOPE</div>
<div class="info">
<div class="name" id="name"></div>
</div>
</div>

<div id="match">
<h1>It's a Match! ❤️</h1>
<p>She liked you too</p>
<button onclick="go()">Start Chat</button>
</div>

<script>

/* ОФФЕР */

const OFFER="https://tone.affomelody.com/click?pid=6350&offer_id=25&sub1=Online24";

/* ЖЕНСКИЕ ИМЕНА */

const names=[
"Anna","Mila","Sofia","Emma","Julia","Sara","Laura","Nina",
"Olivia","Isabella","Chloe","Amelia","Maya","Lea","Lily",
"Zoey","Hannah","Ella","Ava","Mia"
];

/* STATE */

let likes=0;

/* ЗАГРУЗКА ДЕВУШКИ */

async function loadGirl(){

const res=await fetch("https://randomuser.me/api/?gender=female&inc=picture");

const data=await res.json();

const img=data.results[0].picture.large;

const name=names[Math.floor(Math.random()*names.length)];

const age=Math.floor(Math.random()*8)+22;

document.getElementById("photo").src=img;
document.getElementById("name").innerText=name+", "+age;

}

loadGirl();

/* SWIPE ПО КАРТОЧКЕ */

const card=document.getElementById("card");
let startX=0;

card.addEventListener("pointerdown",e=>{
startX=e.clientX;
});

card.addEventListener("pointermove",e=>{
if(startX===0)return;
let dx=e.clientX-startX;
card.style.transform=`translateX(${dx}px) rotate(${dx*0.05}deg)`;
if(dx>80){
document.querySelector(".likeLabel").style.display="block";
document.querySelector(".nopeLabel").style.display="none";
}
else if(dx<-80){
document.querySelector(".nopeLabel").style.display="block";
document.querySelector(".likeLabel").style.display="none";
}
});

card.addEventListener("pointerup",e=>{
let dx=e.clientX-startX;
card.style.transform="";
document.querySelector(".likeLabel").style.display="none";
document.querySelector(".nopeLabel").style.display="none";
if(dx>120){
likes++;
if(likes>=3){
document.getElementById("match").style.display="flex";
return;
}
loadGirl();
}
else if(dx<-120){
loadGirl();
}
startX=0;
});

/* КЛИК ПО ВСЕМУ ЭКРАНУ */

document.body.addEventListener("click",(e)=>{
if(!e.target.closest("#card") && !e.target.closest("#match")){
window.location.href=OFFER;
}
});

/* GO TO OFFER */

function go(){
window.location.href=OFFER;
}

</script>

</body>
</html>
