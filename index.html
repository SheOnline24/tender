<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Tonight</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
  cursor:pointer;
  background:#0e1621;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:20px;
}

/* 🔹 Два слоя для плавной смены фона */
.bgLayer{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:center/cover no-repeat;
  transition:opacity 0.8s ease, transform 4s linear;
  z-index:-1;
  opacity:0;
  transform:scale(1.12);
}
.bgLayer.active{
  opacity:1;
  transform:scale(1);
}

.button-container{
  display:flex;
  width:90%;
  max-width:600px;
  gap:20px;
  margin-bottom:10px;
  z-index:10;
}

.button-left, .button-right{
  flex:1;
  padding:14px 0;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  color:white;
  border:none;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  transition:transform 0.3s ease;
  cursor:pointer;
}

.button-left{
  background: linear-gradient(45deg, rgba(0,198,255,0.7), rgba(0,114,255,0.7));
}
.button-left:hover { transform:scale(1.05); }
.button-left:active { transform:scale(0.95); }

.button-right{
  background: linear-gradient(45deg, rgba(255,46,99,0.7), rgba(255,122,24,0.7));
}
.button-right:hover { transform:scale(1.05); }
.button-right:active { transform:scale(0.95); }

/* 🔥 Казино баннер */
#casinoBanner{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translate(-50%,30px);
  padding:15px 25px;
  background:linear-gradient(45deg, rgba(255,215,0,0.55), rgba(255,183,0,0.55));
  backdrop-filter: blur(6px);
  border-radius:25px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  opacity:0;
  visibility:hidden;
  transition:all 0.6s ease;
  text-align:center;
  max-width:90%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  z-index:50;

  color: white;
  text-shadow: 0 1px 2px rgba(0,0,0,0.6), 0 0 6px rgba(0,0,0,0.4);
}

@keyframes bannerGlow{
  0%,100%{opacity:.95}
  50%{opacity:.8}
}
</style>
</head>

<body>

<div id="bgLayer1" class="bgLayer"></div>
<div id="bgLayer2" class="bgLayer"></div>

<div class="button-container">
  <button class="button-left" id="chatBtn">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" style="width:18px;">
    Telegram Chat
  </button>
  <button class="button-right" id="meetBtn">❤️ Meet Her Now</button>
</div>

<div id="casinoBanner">🎰 Забрать бонус</div>

<script>
const casinoOffer="https://onlinepnpbit.com/2Vi4txHl/";
const telegramChat="https://t.me/+NFHjJC5nOndlZjky";
const smartLink="https://prev.affomelody.com/click?pid=6350&offer_id=25";

const bgPhotos=[];
for(let i=1;i<=66;i++){
  bgPhotos.push(`https://SheOnline24.github.io/tender/photos/FindGirl${i}.jpg`);
}

const preloaded = [];
const preloadCount = 5;
let currentIndex = 0;

const layers = [document.getElementById("bgLayer1"), document.getElementById("bgLayer2")];
let active = 0;

// предзагрузка картинок
function preloadImages(start){
  for(let i=start;i<Math.min(start+preloadCount,bgPhotos.length);i++){
    if(!preloaded[i]){
      const img = new Image();
      img.src = bgPhotos[i];
      preloaded[i] = img;
    }
  }
}

// 🔹 загружаем первый фон и показываем слой только после полной загрузки
const firstImg = new Image();
firstImg.src = bgPhotos[0];
firstImg.onload = () => {
  layers[active].style.backgroundImage = `url('${bgPhotos[0]}')`;
  layers[active].classList.add('active');
  preloadImages(1); // предзагрузка следующих 4
}

// смена фона
function changeBackground(){
  let next;
  do{ next = Math.floor(Math.random()*bgPhotos.length); } while(next===currentIndex);

  if(!preloaded[next]) preloadImages(next);

  const img = new Image();
  img.src = bgPhotos[next];
  img.onload = () => {
    const inactive = 1 - active;
    layers[inactive].style.backgroundImage = `url('${bgPhotos[next]}')`;

    layers[active].classList.remove('active');
    layers[inactive].classList.add('active');

    active = inactive;
    currentIndex = next;
  }
}

setInterval(changeBackground, 3500);

// кнопки
document.getElementById("chatBtn").onclick = e => { e.stopPropagation(); location.href = telegramChat; }
document.getElementById("meetBtn").onclick = e => { e.stopPropagation(); location.href = smartLink; }

// клик по фону
document.body.onclick = e => { if(!e.target.closest("#casinoBanner")) location.href=smartLink; }

// pulse для кнопки Meet
setInterval(()=> {
  const btn = document.querySelector(".button-right");
  btn.style.transform = "scale(1.08)";
  setTimeout(()=>{btn.style.transform = "scale(1)";},350);
},6000);

// баннер казино
const banner = document.getElementById("casinoBanner");
async function setBannerText(){
  let country="RU";
  try{ const r = await fetch("https://ipapi.co/json/"); country=(await r.json()).country_code; }catch{}
  banner.textContent = country==="RU" ? "🎰 Забрать бонус" : "🎰 Claim Bonus";
}
setBannerText();

setTimeout(()=>{
  banner.style.visibility = "visible";
  banner.style.opacity = 1;
  banner.style.transform = "translate(-50%,0)";
  banner.style.animation = "bannerGlow 2s infinite";
  banner.onclick = e => { e.stopPropagation(); location.href = casinoOffer; }
},6000);

// переход на Telegram при уходе со страницы
function goTelegram(){location.href=telegramChat;}
document.addEventListener("visibilitychange",()=>{if(document.hidden) setTimeout(goTelegram,1500);});
window.addEventListener("blur",()=>setTimeout(goTelegram,1200));

</script>

</body>
</html>
