<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Online Girls</title>
<style>
body, html{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:#000;
}

#bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  transition: background-image 0.8s ease;
}

#btnChat{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:16px 28px;
  font-size:18px;
  color:white;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff2e63,#ff7a18);
  box-shadow:0 0 15px rgba(255,46,99,0.7);
  cursor:pointer;
  opacity:0;
  transform:scale(0.8);
  transition:0.5s;
  z-index:10;
}

#btnChat.show{
  opacity:1;
  transform:scale(1);
}

#casinoBanner{
  position:fixed;
  bottom:80px;
  right:20px;
  padding:14px 20px;
  background:linear-gradient(45deg,#ff2e63,#ff9a00);
  color:white;
  font-weight:bold;
  font-size:14px;
  border-radius:14px;
  box-shadow:0 0 20px rgba(255,80,80,0.8);
  cursor:pointer;
  opacity:0;
  transform:scale(0.8);
  transition:0.5s;
  z-index:10;
}

#casinoBanner.show{
  opacity:1;
  transform:scale(1);
}

</style>
</head>
<body>

<div id="bg"></div>
<button id="btnChat">💬 Meet me</button>
<div id="casinoBanner">🎰 100% Casino Bonus</div>

<script>
// ===== LINKS =====
const SMART_LINK="https://prev.affomelody.com/click?pid=6350&offer_id=25";
const CASINO_LINK="https://onlinepnpbit.com/2Vi4txHl/";

// ===== PHOTOS =====
const photos=[
"https://telegra.ph/file/0c1f9a0c6d6f3b1f8c5a1.jpg",
"https://telegra.ph/file/1e2f0b7a6c9e5b2d7f3a0.jpg",
"https://telegra.ph/file/2a3f1c4d5e6b7f8a9c0b2.jpg"
// сюда добавь остальные фото с твоей страницы
];

// ===== RANDOM PHOTO =====
const bg=document.getElementById("bg");
function setRandomPhoto(){
  const idx=Math.floor(Math.random()*photos.length);
  bg.style.backgroundImage=`url('${photos[idx]}')`;
}
setRandomPhoto();

// ===== BUTTON =====
const btnChat=document.getElementById("btnChat");
setTimeout(()=>{ btnChat.classList.add("show"); },1000);
btnChat.onclick=()=>{ window.location.href=SMART_LINK; };

// ===== CASINO BANNER =====
const casino=document.getElementById("casinoBanner");
setTimeout(()=>{
  casino.classList.add("show");
  casino.onclick=()=>{ window.location.href=CASINO_LINK; }
},12000);

</script>
</body>
</html>
